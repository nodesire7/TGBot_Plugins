name: Validate Plugins

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml

      - name: Validate all plugins
        run: |
          python scripts/validate_plugins.py

      - name: Generate index
        run: |
          python scripts/generate_index.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code index.json; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit index update
        if: steps.check_changes.outputs.changes == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.json
          git commit -m "Update plugin index [skip ci]"
          git push

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          pip install black isort flake8

      - name: Run Black
        run: |
          black --check plugins/ --line-length 100 || true

      - name: Run isort
        run: |
          isort --check-only plugins/ || true

      - name: Run flake8
        run: |
          flake8 plugins/ --max-line-length=100 --ignore=E501,W503 || true
